---
layout: default
---

<style>
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
}

.gallery-item img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}
</style>

<h2>{{ page.title }}</h2>

<div class="gallery-grid">
  {% for item in site.objects %}
    <div class="gallery-item">
      <a href="{{ item.url }}">
        <img src="{{ item.image }}">
      </a>
    </div>
  {% endfor %}
</div>
